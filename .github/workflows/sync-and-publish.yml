name: Sync and publish

on:
  schedule:
    # Every 10 minutes. GitHub silently drops scheduled runs under load, so
    # we over-schedule and rely on the sync being a no-op when rate-limited.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-pages  # shared with deploy.yml so Pages deploys don't race
  cancel-in-progress: false  # never kill a running sync; queue instead

permissions:
  contents: write  # for pushing gh-pages
  pages: write
  id-token: write

env:
  # Opt all actions/* (still on Node 20 in v4) to Node 24 ahead of GH's
  # forced cutover on 2026-06-02 — silences the deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Persist the SQLite DB across runs via Actions cache.
      # A date-based key means each run writes a fresh cache entry; restore-keys
      # falls back to the newest previous entry.
      - name: Restore DB cache
        id: db-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.config/guild-rankings-by-day/data.db
          key: clocked-db-${{ github.run_id }}
          restore-keys: |
            clocked-db-

      - name: Sync
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        # Exit 2 = rate limit (expected, non-fatal).
        # Exit 3 = WCL 5xx (transient, surface as warning, don't fail the build).
        run: |
          if npm run sync; then rc=0; else rc=$?; fi
          case $rc in
            0|2) ;;
            3) echo "::warning title=WCL 5xx::Sync exited because WCL returned a 5xx. Build will publish current data." ;;
            *) exit $rc ;;
          esac

      - name: Save DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.config/guild-rankings-by-day/data.db
          key: clocked-db-${{ github.run_id }}

      - name: Build static HTML
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
